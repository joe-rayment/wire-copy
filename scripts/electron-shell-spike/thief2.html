<!doctype html>
<meta charset="utf-8">
<title>THIEF2</title>
<body style="background:#103a70;color:#fff;font:16px sans-serif;padding:20px">
<h1>FOCUS THIEF 2 (steal-on-load)</h1>
<p>Navigated to mid-typing to trigger the electron#42578 steal-after-load path.</p>
<input id="inp" autofocus placeholder="I also steal focus" style="font-size:18px;padding:8px;width:90%">
<div id="log" style="margin-top:12px;font-family:monospace">keys: (none)</div>
<script>
  window.__keys = []
  addEventListener('keydown', e => {
    window.__keys.push(e.key)
    document.getElementById('log').textContent = 'keys: ' + window.__keys.join(',')
  })
  setInterval(() => { window.focus(); document.getElementById('inp').focus() }, 300)
</script>
