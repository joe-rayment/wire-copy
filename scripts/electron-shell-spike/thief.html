<!doctype html>
<meta charset="utf-8">
<title>THIEF1</title>
<body style="background:#701020;color:#fff;font:16px sans-serif;padding:20px">
<h1>FOCUS THIEF 1</h1>
<p>This page tries hard to steal keyboard focus: autofocus + focus() every 300ms + window.focus().</p>
<input id="inp" autofocus placeholder="I steal focus" style="font-size:18px;padding:8px;width:90%">
<div id="log" style="margin-top:12px;font-family:monospace">keys: (none)</div>
<script>
  window.__keys = []
  addEventListener('keydown', e => {
    window.__keys.push(e.key)
    document.getElementById('log').textContent = 'keys: ' + window.__keys.join(',')
  })
  setInterval(() => { window.focus(); document.getElementById('inp').focus() }, 300)
</script>
