version: '3.8'

services:
  wirecopy:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    # Increase shared memory size to prevent Chrome crashes
    shm_size: '2gb'
    restart: "no"
