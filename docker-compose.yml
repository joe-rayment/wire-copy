version: '3.8'

services:
  nyt-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NYT__Email=${NYT_EMAIL}
      - NYT__Password=${NYT_PASSWORD}
      - ElevenLabs__ApiKey=${ELEVEN_LABS_API_KEY}
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    # Increase shared memory size to prevent Chrome crashes
    shm_size: '2gb'
    restart: "no"
