<!doctype html>
<meta charset="utf-8">
<title>Wire Copy</title>
<style>
  /* Styling WE own — no user terminal dictates any of this. */
  html, body { margin: 0; height: 100%; background: #0e0e14; overflow: hidden; }
  #pad  { height: 100%; box-sizing: border-box; padding: 16px 8px 8px 16px; }
  #term { height: 100%; }
  .xterm .xterm-viewport { background: transparent !important; }
</style>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
<div id="pad"><div id="term"></div></div>
<script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
<script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
<script>
  // Type scale (workspace-9d04): the shell owns the initial size (persisted zoom) via the
  // query string, and a per-platform stack replaces bare 'monospace' (whose fallback ran
  // small in the field) until the bundled brand font lands (P6).
  const params = new URLSearchParams(location.search)
  const plat = params.get('plat') || 'linux'
  const FONT_STACK = plat === 'darwin'
    ? "'SF Mono', Menlo, Monaco, monospace"
    : plat === 'win32'
      ? "'Cascadia Mono', Consolas, monospace"
      : "'DejaVu Sans Mono', 'Noto Sans Mono', 'Liberation Mono', monospace"
  const term = new Terminal({
    fontFamily: FONT_STACK,
    fontSize: Number(params.get('font')) || 16,
    cursorBlink: false,
    allowProposedApi: true,
    scrollback: 200,
    theme: {
      background: '#0e0e14',
      foreground: '#e8e6f0',
      cursor: '#ff87d7',
      selectionBackground: '#3d2a4d',
      magenta: '#ff87d7',
      brightMagenta: '#ffa8e2'
    }
  })
  const fit = new FitAddon.FitAddon()
  term.loadAddon(fit)
  term.open(document.getElementById('term'))
  fit.fit()
  term.focus()

  term.onData(d => wc.input(d))
  wc.onPtyData(d => term.write(d))
  wc.ready({ cols: term.cols, rows: term.rows })

  // Live zoom (Cmd/Ctrl +/-/0 handled shell-side): a font change resizes CELLS, not the
  // container, so the ResizeObserver below never fires — refit and re-report explicitly.
  wc.onFont(px => {
    term.options.fontSize = px
    fit.fit()
    wc.resize({ cols: term.cols, rows: term.rows })
  })

  new ResizeObserver(() => {
    fit.fit()
    wc.resize({ cols: term.cols, rows: term.rows })
  }).observe(document.getElementById('term'))

  // In embedded views document.hasFocus() follows WINDOW focus — the keeper and the
  // focus listener must stand down while the shell says the page pane owns the keyboard.
  let shellMode = 'reader'
  wc.onMode(m => { shellMode = m })
  window.addEventListener('focus', () => { if (shellMode === 'reader') term.focus() })
  setInterval(() => {
    if (shellMode === 'reader' && document.hasFocus() &&
        (!document.activeElement || document.activeElement.tagName !== 'TEXTAREA')) term.focus()
  }, 250)

  // Gate/debug hooks (read-only introspection of the pane).
  window.__dims = () => ({ cols: term.cols, rows: term.rows })
  window.__font = () => term.options.fontSize
  window.__termText = () => {
    const b = term.buffer.active
    const out = []
    for (let i = 0; i < b.length; i++) out.push(b.getLine(i) ? b.getLine(i).translateToString(false) : '')
    return out.join('\n')
  }
  window.__wc = {
    reveal: o => wc.reveal(o),
    setMode: m => wc.setMode(m),
    state: () => wc.state(),
    nav: u => wc.nav(u)
  }
</script>
