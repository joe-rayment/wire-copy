<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Key hints</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 22px; margin: 0; background: var(--tr-bg); font-family: var(--tr-font-mono); font-size: 14px; line-height: 1.6; }
  .frame { background: #000; border: 1px solid #1a1a1a; padding: 8px 10px; white-space: pre; margin-bottom: 10px; }
  .lbl { color: var(--tr-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .c { color: #00ffff; } .m { color: #00af00; } .g { color: #00d700; }
</style>
</head>
<body>
  <div class="lbl">Status-bar style (compact, colon separator)</div>
  <div class="frame"><span class="c">Enter</span><span class="m">:open</span> <span class="c">s</span><span class="m">:save</span> <span class="c">A</span><span class="m">:save-all</span> <span class="c">R</span><span class="m">:refresh</span> <span class="c">v</span><span class="m">:reader</span> <span class="c">?</span><span class="m">:help</span></div>

  <div class="lbl">Launcher footer style (bracketed)</div>
  <div class="frame"><span class="m">[</span><span class="c">Enter</span><span class="m">] open  [</span><span class="c">o</span><span class="m">] go to url  [</span><span class="c">a</span><span class="m">] add  [</span><span class="c">d</span><span class="m">] delete  [</span><span class="c">?</span><span class="m">] help</span></div>
</body>
</html>
