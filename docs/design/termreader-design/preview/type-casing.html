<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — casing rules</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; margin: 0; background: var(--tr-bg); }
  .row { display: grid; grid-template-columns: 150px 1fr; gap: 18px; align-items: center; margin-bottom: 12px; }
  .label { color: var(--tr-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .caps  { color: var(--tr-green); font-size: 15px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
  .title { color: var(--tr-bright); font-size: 16px; font-weight: 700; }
  .sentence { color: var(--tr-green); font-size: 15px; }
  .mode  { color: var(--tr-green); font-size: 15px; font-weight: 700; }
  .action { color: var(--tr-med); font-size: 15px; }
</style>
</head>
<body>
  <div class="row"><div class="label">Bookmark card</div><div class="caps">ARS TECHNICA</div></div>
  <div class="row"><div class="label">Group header</div><div class="caps">▼ NAVIGATION (12)</div></div>
  <div class="row"><div class="label">Article title</div><div class="title">SpaceX Starship Reaches Orbit on Its First Full Flight</div></div>
  <div class="row"><div class="label">Screen title</div><div class="sentence">Ars Technica: Science</div></div>
  <div class="row"><div class="label">Toast</div><div class="sentence">Cache warmed · 24 articles</div></div>
  <div class="row"><div class="label">Mode label</div><div class="mode">ReaderView</div></div>
  <div class="row"><div class="label">Hint action</div><div class="action">open · save · save-all · browser · back</div></div>
</body>
</html>
