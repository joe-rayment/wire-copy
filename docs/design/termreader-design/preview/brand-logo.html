<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo</title>
<style>
  html, body { background: #0a0a0a; margin: 0; }
  body {
    padding: 22px 26px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 15px;
    line-height: 1.6;
    color: #00d700;
  }
  .lbl {
    color: #87ff87;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 8px;
    font-weight: 700;
  }
  .block { margin-bottom: 20px; }

  .wordmark {
    font-size: 42px;
    font-weight: 700;
    color: #ff87d7;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .wordmark .cursor {
    display: inline-block;
    width: 0.5em;
    height: 0.85em;
    background: #00d700;
    margin-left: 6px;
    vertical-align: baseline;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Rounded header — CSS box for alignment */
  .header-box {
    display: inline-block;
    border: 1.5px solid #5fff5f;
    border-radius: 10px;
    padding: 10px 18px;
    min-width: 340px;
  }
  .header-box .brand { color: #ff87d7; font-weight: 700; }
  .header-box .tag { color: #5fff87; margin-top: 4px; }

  .lockup { display: flex; align-items: baseline; gap: 10px; }
  .lockup .mark { color: #ff87d7; font-weight: 700; font-size: 20px; }
  .lockup .ver { color: #5fff87; }
  .sub-line { color: #5fff87; margin-top: 2px; }
</style>
</head>
<body>

  <div class="block">
    <div class="lbl">Wordmark · bright (ANSI 212) + cursor</div>
    <div class="wordmark">TermReader<span class="cursor"></span></div>
  </div>

  <div class="block">
    <div class="lbl">Boxed header · the canonical chrome</div>
    <div class="header-box">
      <div class="brand">TermReader</div>
      <div class="tag">a better reading experience</div>
    </div>
  </div>

  <div class="block">
    <div class="lbl">Inline lockup</div>
    <div class="lockup">
      <span class="mark">TermReader</span>
      <span class="ver">· v1.0</span>
    </div>
    <div class="sub-line">a better reading experience</div>
  </div>

</body>
</html>
