<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cards — normal vs selected</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 22px; margin: 0; background: var(--tr-bg); font-family: var(--tr-font-mono); font-size: 14px; line-height: 1.6; }
  .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: stretch; }
  .col { display: flex; flex-direction: column; }
  .lbl  { color: var(--tr-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }

  .card {
    background: #000;
    padding: 8px 10px;
    white-space: pre;
    flex: 1;                /* fill same vertical space as sibling */
    min-height: 120px;
    font-family: var(--tr-font-mono);
  }

  .c { color: #00ffff; }
  .g { color: #00d700; font-weight: 700; }
  .m { color: #00af00; }
  .d { color: #005f00; }

  /* Selected card.
     The accent rail on the left is rendered as a 1ch column of repeating
     ▌ glyphs filling the full card height. In a real terminal this is
     just a column of ▌ in column 0 of every row, including the empty
     rows below the content — exactly what we'd write to the screen. */
  .selcard {
    background: #005f00;
    color: #e4e4e4;
    padding: 0;
    flex: 1;
    min-height: 120px;
    font-family: var(--tr-font-mono);
    line-height: 1.6;
    display: grid;
    grid-template-columns: 1ch 1fr;
    column-gap: 0;
  }
  .selcard .rail {
    color: #5f875f;
    font-weight: 700;
    white-space: pre;
    /* Render the rail glyph repeated on every visible row. Browsers
       will lay this out as one ▌ per line-height row of the column. */
    overflow: hidden;
  }
  .selcard .body {
    padding: 8px 10px 8px 4px;
    white-space: pre;
  }
  .selcard .body .row { margin: 0; }
  .selcard .body .w   { color: #e4e4e4; font-weight: 700; }
  .selcard .body .wm  { color: #d0d0d0; }
</style>
</head>
<body>
  <div class="pair">
    <div class="col">
      <div class="lbl">Normal</div>
      <div class="card"> <span class="c">[4]</span>   <span class="g">NEW YORK TIMES</span> <span class="g">★</span>
       <span class="m">nytimes.com</span>
 <span class="d">──────────────────────────</span></div>
    </div>
    <div class="col">
      <div class="lbl">Selected</div>
      <div class="selcard">
        <div class="rail" id="rail"></div>
        <div class="body">
          <div class="row"><span class="w">[4]   NEW YORK TIMES ★</span></div>
          <div class="row">      <span class="wm">nytimes.com</span></div>
        </div>
      </div>
    </div>
  </div>

<script>
  // Fill the rail column with one ▌ per text-row of the card,
  // matching the body line-height so the bar runs the full visible height.
  // Pure terminals get this for free (writing ▌ in col 0 of every row);
  // here we have to compute the row count from the card's pixel height.
  (function(){
    const rail = document.getElementById('rail');
    const card = rail.parentElement;
    const styles = getComputedStyle(card);
    const lh = parseFloat(styles.lineHeight) || 22;
    const fit = () => {
      const h = card.clientHeight;
      const rows = Math.max(1, Math.ceil(h / lh));
      rail.textContent = Array(rows).fill('▌').join('\n');
    };
    fit();
    window.addEventListener('resize', fit);
  })();
</script>
</body>
</html>
