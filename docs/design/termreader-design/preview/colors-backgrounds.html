<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — backgrounds</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; margin: 0; background: var(--tr-bg); display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: 1fr; gap: 6px; }
  .strip { font-family: var(--tr-font-mono); font-size: 14px; padding: 8px 12px; white-space: pre; }
  .label { color: var(--tr-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .sel { background:#005f00; color:#e4e4e4; }
  .hi  { background:#005f87; color:#ffffff; }
  .bg  { background:#000000; color:#00d700; border: 1px solid #1a1a1a; }
</style>
</head>
<body>
  <div class="row"><div class="label">Terminal default · #000 · body green</div><div class="strip bg">SpaceX Starship Reaches Orbit on Its First Full Flight</div></div>
  <div class="row"><div class="label">Selection row · bg #005f00 · fg #e4e4e4</div><div class="strip sel">▌ NEW YORK TIMES ★               </div></div>
  <div class="row"><div class="label">Search hit · bg #005f87 · fg #fff</div><div class="strip bg">…mechanical arms — a maneuver SpaceX calls "chopstick" <span class="hi">catch</span>.</div></div>
</body>
</html>
