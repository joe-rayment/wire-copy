<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Status bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 22px; margin: 0; background: var(--tr-bg); font-family: var(--tr-font-mono); font-size: 14px; line-height: 1.6; }
  .frame { background: #000; border: 1px solid #1a1a1a; padding: 8px 10px; white-space: pre; }
  .lbl { color: var(--tr-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .d { color: #005f00; } .m { color: #00af00; } .g { color: #00d700; } .c { color: #00ffff; }
</style>
</head>
<body>
  <div class="lbl">Reader view status bar (2 lines)</div>
  <div class="frame"><span class="d">──────────────────────────────────────────────────────────</span>
 <span class="g">ReaderView</span> <span class="c">s</span><span class="m">:save</span> <span class="c">o</span><span class="m">:browser</span> <span class="c">h/l</span><span class="m">:width</span> <span class="c">v</span><span class="m">:links</span> <span class="c">b</span><span class="m">:back</span> <span class="c">?</span><span class="m">:help</span>
 <span class="m">L12/87 W72 38%</span>                                   <span class="m">cached 5m ago</span></div>
</body>
</html>
