<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WireCopy &mdash; UI Kit</title>
<style>
  :root {
    --tr-bright:#ff87d7; --tr-green:#00d700; --tr-med:#00af00; --tr-muted:#5f875f; --tr-dim:#005f00;
    --tr-cyan:#00ffff; --tr-white:#e4e4e4; --tr-pink:#ff5fd7; --tr-success:#87ff5f; --tr-amber:#ffaf00; --tr-red:#ff5f5f;
    --tr-bg:#0a0a0a; --tr-bg-pure:#000000; --tr-sel-bg:#005f00; --tr-hi-bg:#005f87; --tr-hi-fg:#ffffff;
    --tr-font-mono: 'JetBrains Mono','Fira Code','SF Mono',Menlo,Consolas,ui-monospace,monospace;
  }
  html, body { background: var(--tr-bg); color: var(--tr-green); font-family: var(--tr-font-mono); margin: 0; }
  body { padding: 24px; }
  .tr-terminal {
    background: var(--tr-bg-pure); border: 1px solid #333; border-radius: 6px;
    padding: 8px 12px; overflow-x: auto; white-space: pre;
    font-family: var(--tr-font-mono); font-size: 15px; line-height: 1.7;
    color: var(--tr-green); position: relative;
  }
  .tr-terminal::before {
    content: '\25CF \25CF \25CF'; display: block; color: #555;
    font-size: 10px; letter-spacing: 4px; margin-bottom: 8px;
    padding-bottom: 6px; border-bottom: 1px solid #222;
  }
  .stage { position: relative; max-width: 940px; margin: 0 auto; }
  .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .controls button {
    background: transparent; border: 1px solid var(--tr-dim); color: var(--tr-green);
    font-family: var(--tr-font-mono); font-size: 13px; padding: 6px 12px; cursor: pointer;
    letter-spacing: 0.05em;
  }
  .controls button.on { background: var(--tr-sel-bg); color: var(--tr-white); border-color: var(--tr-muted); }
  .controls button:hover { border-color: var(--tr-muted); }
  .note { color: var(--tr-muted); font-family: var(--tr-font-mono); font-size: 12px; margin-top: 12px; text-align: center; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

<script type="text/babel" data-presets="react">
/* ========== atoms ========== */
const TerminalFrame = ({ width = 860, children }) => (
  <div className="tr-terminal" style={{ width, padding: "10px 14px 8px", lineHeight: 1.6, fontSize: 15 }}>
    {children}
  </div>
);

const BoxHeader = ({ title, subtitle, width = 78, titleColor = "var(--tr-bright)" }) => {
  const sub = (subtitle || "").padEnd(width - 2, " ").slice(0, width - 2);
  return (
    <pre style={{ margin: 0, whiteSpace: "pre", color: "var(--tr-dim)" }}>
      {"\u256D\u2500 "}<span style={{ color: titleColor, fontWeight: 700 }}>{title}</span>{" \u2500"}{"\u2500".repeat(Math.max(0, width - title.length - 5))}{"\u256E"}{"\n"}
      {"\u2502 "}<span style={{ color: "var(--tr-med)" }}>{sub.trim().padEnd(width - 2, " ")}</span>{"\u2502"}{"\n"}
      {"\u2570"}{"\u2500".repeat(width)}{"\u256F"}
    </pre>
  );
};

const KeyHint = ({ k, action, bracket = false }) => (
  bracket ? (
    <span><span style={{ color: "var(--tr-med)" }}>[</span><span style={{ color: "var(--tr-cyan)" }}>{k}</span><span style={{ color: "var(--tr-med)" }}>] {action}</span></span>
  ) : (
    <span><span style={{ color: "var(--tr-cyan)" }}>{k}</span><span style={{ color: "var(--tr-med)" }}>:{action}</span></span>
  )
);

/* ========== Launcher ========== */
const Launcher = ({ selected = 4 }) => {
  const list = [
    { id: 1, name: "ARS TECHNICA", domain: "arstechnica.com" },
    { id: 2, name: "HACKER NEWS",  domain: "news.ycombinator.com" },
    { id: 3, name: "THE VERGE",    domain: "theverge.com" },
    { id: 4, name: "NEW YORK TIMES", domain: "nytimes.com", star: true },
    { id: 5, name: "WIRED",        domain: "wired.com" },
    { id: 6, name: "LOBSTERS",     domain: "lobste.rs" },
  ];
  const cell = (bm, isSel) => {
    if (!isSel) return (
      <pre style={{ margin: 0, whiteSpace: "pre" }}>
        {" "}<span style={{ color: "var(--tr-cyan)" }}>[{bm.id}]</span>{"   "}
        <span style={{ color: "var(--tr-green)", fontWeight: 700 }}>{bm.name}</span>
        {bm.star ? <span style={{ color: "var(--tr-green)" }}> \u2605</span> : null}{"\n"}
        {"       "}<span style={{ color: "var(--tr-med)" }}>{bm.domain}</span>
      </pre>
    );
    return (
      <pre style={{ margin: 0, whiteSpace: "pre", background: "var(--tr-sel-bg)", color: "var(--tr-white)" }}>
        <span style={{ color: "var(--tr-muted)" }}>{"\u258C"}</span>{" [" + bm.id + "]   " + bm.name + (bm.star ? " \u2605" : "")}{"\n"}
        <span style={{ color: "var(--tr-muted)" }}>{"\u258C"}</span>{"       " + bm.domain}
      </pre>
    );
  };
  const rows = [];
  for (let i = 0; i < list.length; i += 2) rows.push([list[i], list[i + 1]]);
  return (
    <>
      <BoxHeader title="WireCopy" subtitle={`${list.length} bookmarks`} titleColor="var(--tr-green)" />
      <div style={{ height: 10 }} />
      <div style={{ margin: "0 auto", width: "62%", color: "var(--tr-dim)", whiteSpace: "pre" }}>
        {"\u256D"}{"\u2500".repeat(46)}{"\u256E"}{"\n"}
        {"\u2502 "}<span style={{ color: "var(--tr-med)" }}>{"Go to URL..." + " ".repeat(33)}</span>{"\u2502"}{"\n"}
        {"\u2570"}{"\u2500".repeat(46)}{"\u256F"}
      </div>
      <div style={{ height: 10 }} />
      {rows.map((r, i) => (
        <React.Fragment key={i}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 8px 1fr", gap: 0 }}>
            <div>{cell(r[0], r[0].id === selected)}</div>
            <div style={{ color: "var(--tr-dim)", whiteSpace: "pre" }}>{"\u2502\n\u2502\n\u2502"}</div>
            <div>{r[1] ? cell(r[1], r[1].id === selected) : null}</div>
          </div>
          {i < rows.length - 1 && (
            <div style={{ color: "var(--tr-dim)", whiteSpace: "pre" }}>
              {"\u2500".repeat(38)}{"\u253C"}{"\u2500".repeat(39)}
            </div>
          )}
        </React.Fragment>
      ))}
      <div style={{ height: 8 }} />
      <div style={{ color: "var(--tr-dim)" }}>{"\u2500".repeat(78)}</div>
      <div style={{ whiteSpace: "pre" }}>
        {" "}<KeyHint k="Enter" action="open" bracket />{"  "}
        <KeyHint k="o" action="go to url" bracket />{"  "}
        <KeyHint k="a" action="add" bracket />{"  "}
        <KeyHint k="d" action="delete" bracket />{"  "}
        <KeyHint k="?" action="help" bracket />
        <span style={{ color: "var(--tr-dim)", float: "right" }}>v1.0</span>
      </div>
    </>
  );
};

/* ========== LinkTree ========== */
const LinkTree = ({ selected = 1 }) => {
  const items = [
    { title: "A century after rockets,", title2: "we still can't predict the weather", author: "Eric Berger \u00B7 Today" },
    { title: "SpaceX Starship reaches orbit", title2: "on its first full flight", author: "Stephen Clark \u00B7 Today", highlight: "SpaceX" },
    { title: "NASA selects two new", title2: "missions for 2028", author: "Jeff Foust \u00B7 Yesterday" },
    { title: "The James Webb telescope", title2: "spots new galaxies forming", author: "Ashley Strickland \u00B7 Mar 15" },
  ];
  const card = (it, isSel, i) => {
    const titleColor = isSel ? "var(--tr-white)" : "var(--tr-bright)";
    const bg = isSel ? { background: "var(--tr-sel-bg)" } : {};
    return (
      <pre key={i} style={{ margin: 0, whiteSpace: "pre", ...bg }}>
        {isSel ? <span style={{ color: "var(--tr-muted)" }}>{"\u258C "}</span> : " "}
        {it.highlight ? <>
          <span style={{ background: "var(--tr-hi-bg)", color: "var(--tr-hi-fg)" }}>{it.highlight}</span>
          <span style={{ color: titleColor, fontWeight: 700 }}>{it.title.replace(it.highlight, "")}</span>
        </> : <span style={{ color: titleColor, fontWeight: 700 }}>{it.title}</span>}{"\n"}
        {isSel ? <span style={{ color: "var(--tr-muted)" }}>{"\u258C "}</span> : " "}
        <span style={{ color: titleColor, fontWeight: 700 }}>{it.title2}</span>{"\n"}
        {isSel ? <span style={{ color: "var(--tr-muted)" }}>{"\u258C "}</span> : " "}
        <span style={{ color: "var(--tr-med)" }}>{it.author}</span>
      </pre>
    );
  };
  return (
    <>
      <BoxHeader title="Ars Technica: Science" subtitle="Eric Berger \u00B7 Today \u00B7 arstechnica.com \u00B7 24 links \u00B7 3 sections" />
      <div style={{ height: 10 }} />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 8px 1fr", gap: 0 }}>
        <div>{card(items[0], selected === 0, 0)}</div>
        <div style={{ color: "var(--tr-dim)", whiteSpace: "pre" }}>{"\u2502\n\u2502\n\u2502"}</div>
        <div>{card(items[1], selected === 1, 1)}</div>
      </div>
      <div style={{ color: "var(--tr-dim)", whiteSpace: "pre" }}>{"\u2500".repeat(38)}{"\u253C"}{"\u2500".repeat(39)}</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 8px 1fr", gap: 0 }}>
        <div>{card(items[2], selected === 2, 2)}</div>
        <div style={{ color: "var(--tr-dim)", whiteSpace: "pre" }}>{"\u2502\n\u2502\n\u2502"}</div>
        <div>{card(items[3], selected === 3, 3)}</div>
      </div>
      <div style={{ height: 12 }} />
      <div style={{ color: "var(--tr-dim)" }}>{"\u2500".repeat(78)}</div>
      <div style={{ whiteSpace: "pre" }}>
        {" "}<span style={{ color: "var(--tr-green)", fontWeight: 700 }}>LinkView</span>{" "}
        <KeyHint k="Enter" action="open" />{" "}<KeyHint k="s" action="save" />{" "}<KeyHint k="A" action="save-all" />{" "}
        <KeyHint k="R" action="refresh" />{" "}<KeyHint k="v" action="reader" />{" "}<KeyHint k="?" action="help" />
      </div>
    </>
  );
};

/* ========== Reader ========== */
const Reader = () => {
  const lines = [
    "SpaceX's massive Starship rocket completed its first full",
    "orbital flight on Monday, a landmark achievement that opens",
    "the door to the company's most ambitious plans for space",
    "exploration.",
    "",
    "The two-stage rocket lifted off from SpaceX's Starbase",
    "facility in South Texas at 7:42 a.m. Central time, riding",
    "on the thrust of 33 Raptor engines that generate roughly",
    "16.7 million pounds of force at full power.",
    "",
    "After a nominal first-stage burn, the Super Heavy booster",
    "separated and executed a controlled descent, landing on the",
    "launch tower's mechanical arms \u2014 a maneuver SpaceX calls",
    "\"chopstick\" catch. The upper stage continued to orbit,",
  ];
  return (
    <>
      <div style={{ margin: "4px 0 8px", padding: "0 4ch" }}>
        <div style={{ color: "var(--tr-bright)", fontWeight: 700 }}>SpaceX Starship Reaches Orbit on Its First Full Flight</div>
        <div style={{ color: "var(--tr-med)" }}>Stephen Clark \u00B7 March 18, 2026 \u00B7 arstechnica.com</div>
      </div>
      <div style={{ padding: "0 4ch" }}>
        {lines.map((t, i) => (
          <div key={i} style={{ whiteSpace: "pre", color: "var(--tr-green)" }}>
            {i === 10 ? <span style={{ color: "var(--tr-muted)" }}>{"\u258E"}</span> : " "}{" "}{t}
          </div>
        ))}
      </div>
      <div style={{ height: 8 }} />
      <div style={{ color: "var(--tr-dim)" }}>{"\u2500".repeat(78)}</div>
      <div style={{ whiteSpace: "pre" }}>
        {" "}<span style={{ color: "var(--tr-green)", fontWeight: 700 }}>ReaderView</span>{" "}
        <KeyHint k="s" action="save" />{" "}<KeyHint k="o" action="browser" />{" "}
        <KeyHint k="h/l" action="width" />{" "}<KeyHint k="v" action="links" />{" "}
        <KeyHint k="b" action="back" />{" "}<KeyHint k="?" action="help" />
      </div>
    </>
  );
};

/* ========== ReadingList ========== */
const ReadingList = ({ selected = 2 }) => {
  const items = [
    { dot: "\u25CF", read: false, title: "SpaceX Starship Reaches Orbit on Its First Full Flight", domain: "arstechnica.com", cached: true },
    { dot: "\u25CF", read: false, title: "NASA Selects Two New Missions for 2028 Launch Window", domain: "nasa.gov", cached: true },
    { dot: "\u25CF", read: false, title: "CRISPR Breakthrough Enables Single-Gene Therapy", domain: "nature.com", cached: true },
    { dot: "\u25CB", read: true,  title: "The Rise of Quantum Computing in Drug Discovery", domain: "wired.com" },
    { dot: "\u25CB", read: true,  title: "Climate Models Validated by 50 Years of Ocean Data", domain: "reuters.com", cached: true },
  ];
  return (
    <>
      <BoxHeader title="Tech News (12 items)" titleColor="var(--tr-green)" subtitle="" />
      <div style={{ height: 10 }} />
      <div style={{ margin: "0 auto", width: "55%" }}>
        <div style={{ background: "var(--tr-sel-bg)", color: "var(--tr-white)", whiteSpace: "pre", padding: "0 2ch" }}>{" \u25B6\u25B6  Generate Podcast                              [p] "}</div>
      </div>
      <div style={{ height: 12 }} />
      {items.map((it, i) => {
        const sel = i === selected;
        const color = sel ? "var(--tr-white)" : it.read ? "var(--tr-med)" : "var(--tr-green)";
        if (sel) return (
          <React.Fragment key={i}>
            <pre style={{ margin: 0, whiteSpace: "pre", background: "var(--tr-sel-bg)", color: "var(--tr-white)" }}>
              <span style={{ color: "var(--tr-muted)" }}>{"\u258C"}</span>{" " + it.dot + " " + it.title}
            </pre>
            <pre style={{ margin: 0, whiteSpace: "pre", background: "var(--tr-sel-bg)", color: "var(--tr-white)" }}>
              <span style={{ color: "var(--tr-muted)" }}>{"\u258C"}</span>{"     " + it.domain + (it.cached ? " \u00B7 cached" : "")}
            </pre>
            {i < items.length - 1 && <div style={{ color: "var(--tr-dim)", paddingLeft: 24 }}>{"\u2576\u2500\u2500\u2574"}</div>}
          </React.Fragment>
        );
        return (
          <React.Fragment key={i}>
            <div style={{ whiteSpace: "pre" }}>
              {"   "}<span style={{ color }}>{it.dot}</span>{" "}
              <span style={{ color }}>{it.title}</span>
            </div>
            <div style={{ whiteSpace: "pre" }}>
              {"       "}<span style={{ color: "var(--tr-med)" }}>{it.domain}</span>
              {it.cached ? <span style={{ color: "var(--tr-cyan)" }}>{" \u00B7 cached"}</span> : null}
            </div>
            {i < items.length - 1 && <div style={{ color: "var(--tr-dim)", paddingLeft: 24 }}>{"\u2576\u2500\u2500\u2574"}</div>}
          </React.Fragment>
        );
      })}
      <div style={{ height: 8 }} />
      <div style={{ color: "var(--tr-dim)" }}>{"\u2500".repeat(78)}</div>
      <div style={{ whiteSpace: "pre" }}>
        {" "}<span style={{ color: "var(--tr-green)", fontWeight: 700 }}>Reading List</span>{" "}
        <KeyHint k="Enter" action="open" />{" "}<KeyHint k="d" action="remove" />{" "}
        <KeyHint k="J/K" action="reorder" />{" "}<KeyHint k="p" action="podcast" />{" "}
        <KeyHint k="b" action="back" />{" "}<KeyHint k="?" action="help" />
      </div>
    </>
  );
};

/* ========== Modals & Toasts ========== */
const Toast = ({ kind = "info", message, detail }) => {
  const borderColor = kind === "celebration" ? "var(--tr-pink)" : kind === "error" ? "var(--tr-red)" : "var(--tr-cyan)";
  const icon = kind === "celebration" ? "\u2726 " : "";
  return (
    <div style={{ position: "absolute", top: 34, right: 18, whiteSpace: "pre", color: borderColor, fontFamily: "var(--tr-font-mono)", fontSize: 15, lineHeight: 1.5 }}>
      <div>{"\u256D" + "\u2500".repeat(32) + "\u256E"}</div>
      <div>{"\u2502 "}<span style={{ color: kind === "celebration" ? "var(--tr-pink)" : "var(--tr-green)" }}>{icon}{message}</span> <span style={{ color: "var(--tr-med)" }}>{detail}</span>{" \u2502"}</div>
      <div>{"\u2570" + "\u2500".repeat(32) + "\u256F"}</div>
    </div>
  );
};

const Modal = ({ kind = "loading" }) => (
  <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.7)" }}>
    <pre style={{ margin: 0, whiteSpace: "pre", color: "var(--tr-dim)", background: "var(--tr-bg-pure)", border: "1px solid var(--tr-dim)", padding: "10px 16px", borderRadius: 6, fontSize: 15, lineHeight: 1.6 }}>
      {kind === "loading" ? (
        <><span style={{ color: "var(--tr-green)" }}>{"Loading page..."}</span>{"\n\n"}<span style={{ color: "var(--tr-med)" }}>arstechnica.com/science/2026/...</span></>
      ) : (
        <><span style={{ color: "var(--tr-red)" }}>{"Page failed to load"}</span>{"\n\n"}<span style={{ color: "var(--tr-med)" }}>Connection timed out after 30s</span>{"\n\n"}<span style={{ color: "var(--tr-cyan)" }}>R</span><span style={{ color: "var(--tr-med)" }}>:retry  </span><span style={{ color: "var(--tr-cyan)" }}>b</span><span style={{ color: "var(--tr-med)" }}>:back  </span><span style={{ color: "var(--tr-cyan)" }}>o</span><span style={{ color: "var(--tr-med)" }}>:browser</span></>
      )}
    </pre>
  </div>
);

/* ========== App ========== */
const { useState, useEffect } = React;
const SCREENS = [
  { id: "launcher", label: "Launcher" },
  { id: "linktree", label: "Link Tree" },
  { id: "reader",   label: "Reader" },
  { id: "list",     label: "Reading List" },
];

function App() {
  const [screen, setScreen] = useState("launcher");
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    const onKey = (e) => {
      if (modal) { if (e.key === "Escape") setModal(null); return; }
      if (e.key === "b") { setScreen("launcher"); return; }
      if (screen === "launcher" && (e.key === "Enter" || /^[1-6]$/.test(e.key))) {
        setModal("loading");
        setTimeout(() => {
          setModal(null); setScreen("linktree");
          setToast({ kind: "info", message: "Cache warmed", detail: "24/24" });
          setTimeout(() => setToast(null), 2000);
        }, 700);
      } else if (screen === "linktree" && (e.key === "v" || e.key === "Enter")) setScreen("reader");
      else if (screen === "reader" && e.key === "v") setScreen("linktree");
      else if (screen === "list" && e.key === "p") {
        setToast({ kind: "celebration", message: "Podcast ready!", detail: "12 chapters" });
        setTimeout(() => setToast(null), 3000);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [screen, modal]);

  return (
    <div className="stage">
      <div className="controls">
        {SCREENS.map(s => (
          <button key={s.id} className={screen === s.id ? "on" : ""} onClick={() => setScreen(s.id)}>{s.label}</button>
        ))}
        <button onClick={() => setModal("loading")}>Loading modal</button>
        <button onClick={() => setModal("error")}>Error modal</button>
        <button onClick={() => { setToast({ kind: "celebration", message: "Podcast ready!", detail: "12 chapters" }); setTimeout(() => setToast(null), 3000); }}>Celebration toast</button>
      </div>
      <div style={{ position: "relative" }}>
        <TerminalFrame>
          {screen === "launcher" && <Launcher selected={4} />}
          {screen === "linktree" && <LinkTree selected={1} />}
          {screen === "reader"   && <Reader />}
          {screen === "list"     && <ReadingList selected={2} />}
        </TerminalFrame>
        {modal && <Modal kind={modal} />}
        {toast && <Toast {...toast} />}
      </div>
      <div className="note">keys: 1-6 / Enter &middot; v &middot; s &middot; p &middot; b &middot; Esc</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
