<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Iconography — indicators</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; margin: 0; background: var(--tr-bg); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 18px; }
  .cell { display: flex; flex-direction: column; gap: 4px; align-items: flex-start; }
  .glyph { font-family: var(--tr-font-mono); font-size: 22px; line-height: 1; }
  .name { color: var(--tr-med); font-size: 12px; }
  .use  { color: var(--tr-muted); font-size: 11px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><span class="glyph" style="color:#00d700">●</span><span class="name">unread</span><span class="use">U+25CF</span></div>
    <div class="cell"><span class="glyph" style="color:#00af00">○</span><span class="name">read</span><span class="use">U+25CB</span></div>
    <div class="cell"><span class="glyph" style="color:#00d700">★</span><span class="name">default</span><span class="use">U+2605</span></div>
    <div class="cell"><span class="glyph" style="color:#87ff5f">✔</span><span class="name">success</span><span class="use">U+2714</span></div>
    <div class="cell"><span class="glyph" style="color:#ff5f5f">✗</span><span class="name">error</span><span class="use">U+2717</span></div>
    <div class="cell"><span class="glyph" style="color:#ffaf00">⚡</span><span class="name">warning</span><span class="use">U+26A1</span></div>
    <div class="cell"><span class="glyph" style="color:#00ffff">↩</span><span class="name">undo</span><span class="use">U+21A9</span></div>
    <div class="cell"><span class="glyph" style="color:#ff5fd7">✦</span><span class="name">celebration</span><span class="use">U+2726</span></div>
    <div class="cell"><span class="glyph" style="color:#ff5fd7">♫</span><span class="name">podcast</span><span class="use">U+266B</span></div>
    <div class="cell"><span class="glyph" style="color:#00d700">▶</span><span class="name">collapsed</span><span class="use">U+25B6</span></div>
    <div class="cell"><span class="glyph" style="color:#00d700">▼</span><span class="name">expanded</span><span class="use">U+25BC</span></div>
    <div class="cell"><span class="glyph" style="color:#5f875f">▲</span><span class="name">scroll up</span><span class="use">U+25B2</span></div>
  </div>
</body>
</html>
