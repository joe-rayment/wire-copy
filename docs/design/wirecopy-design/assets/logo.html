<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WireCopy — wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 48px; }
  .wrap { display: flex; flex-direction: column; gap: 28px; align-items: flex-start; }
  pre { margin: 0; }
</style>
</head>
<body>
  <div class="wrap">
    <pre class="tr-terminal" style="padding: 24px 28px;">
<span class="tr-d">╭─</span> <span class="tr-b tr-bold">WireCopy</span> <span class="tr-d">──────────────────────────╮</span>
<span class="tr-d">│</span> <span class="tr-m">A better reading experience</span>          <span class="tr-d">│</span>
<span class="tr-d">╰──────────────────────────────────────╯</span></pre>

    <pre class="tr-terminal"><span class="tr-b tr-bold" style="font-size: 36px; letter-spacing: 2px;">WireCopy</span></pre>

    <pre class="tr-terminal"><span class="tr-mu">▌</span><span class="tr-b tr-bold" style="font-size: 48px;">T</span></pre>
  </div>
</body>
</html>
