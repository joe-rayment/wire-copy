<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WireCopy</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230b0b0e'/%3E%3Ctext x='8' y='13' font-size='13' font-family='monospace' fill='%23ff5fa2' text-anchor='middle'%3EW%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/vendor/xterm.css" />
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #0b0b0e; color: #ddd;
      font-family: ui-monospace, "DejaVu Sans Mono", monospace; }
    #app { display: flex; height: 100vh; width: 100vw; }
    #term-pane { flex: 1 1 55%; min-width: 240px; height: 100%; background: #000; padding: 4px; box-sizing: border-box; }
    #term { height: 100%; width: 100%; }
    #splitter { width: 5px; cursor: col-resize; background: #222; }
    #web-pane { flex: 1 1 45%; min-width: 0; height: 100%; position: relative; background: #15151a;
      display: flex; flex-direction: column; }
    #web-toolbar { display: flex; gap: 6px; padding: 6px; background: #1c1c22; font-size: 12px; align-items: center; }
    #web-url { flex: 1; background: #0b0b0e; color: #ddd; border: 1px solid #333; padding: 4px 6px; border-radius: 4px; }
    #web-surface { flex: 1; position: relative; overflow: hidden; display: flex; align-items: flex-start; justify-content: center; }
    #screencast { max-width: 100%; display: block; }
    .hidden { display: none !important; }
    button { background: #2a2a33; color: #ddd; border: 1px solid #3a3a44; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="app">
    <div id="term-pane"><div id="term"></div></div>
    <div id="splitter"></div>
    <div id="web-pane">
      <div id="web-toolbar">
        <input id="web-url" placeholder="https://…" value="" />
        <button id="web-go">Go</button>
        <button id="web-hide" title="Hide web pane (F9)">Hide</button>
        <span id="web-status">connecting…</span>
      </div>
      <div id="web-surface">
        <img id="screencast" alt="web pane" />
      </div>
    </div>
  </div>

  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/addon-fit.js"></script>
  <script>
    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const wsBase = `${wsProto}://${location.host}`;
    // One session id per tab correlates the terminal child with its web pane.
    const sessionId = (crypto.randomUUID ? crypto.randomUUID() : String(Math.random())).replace(/-/g, '');

    // ---- Terminal ----
    const term = new Terminal({
      fontFamily: 'ui-monospace, "DejaVu Sans Mono", monospace',
      // workspace-dlkb.1: 14 read too small in the browser-hosted shell vs the old TUI; 16 restores
      // comfortable reading (the xterm-native equivalent of the old "larger font" Avalonia fix).
      fontSize: 16,
      cursorBlink: true,
      // workspace-dlkb.3: draw box-drawing / block glyphs pinned to the cell grid instead of trusting
      // the web font's metrics (the xterm-native equivalent of the old "pin glyphs to the cell grid"
      // fix). Active when a canvas/webgl renderer is used; harmless with the DOM renderer. The wordmark
      // and link-list borders also rely on a font with correct box-drawing metrics (DejaVu Sans Mono).
      customGlyphs: true,
      theme: { background: '#000000' },
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('term'));
    fit.fit();

    const termSocket = new WebSocket(`${wsBase}/ws/terminal?session=${sessionId}`);
    termSocket.binaryType = 'arraybuffer';
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    termSocket.onopen = () => sendResize();
    termSocket.onmessage = (ev) => {
      if (typeof ev.data === 'string') term.write(ev.data);
      // workspace-dlkb.2: decode with { stream: true } on the ONE persistent decoder. The PTY chunks
      // at arbitrary byte boundaries, so a multibyte UTF-8 glyph (3-byte box-drawing, 2-byte
      // punctuation) can split across two websocket frames. Without streaming, each decode() flushes
      // and turns the trailing partial bytes into a replacement char — the "stray characters" bug.
      // Streaming buffers the incomplete tail and completes it on the next frame (the xterm-native
      // equivalent of the old stateful-UTF-8 PTY decoder fix).
      else term.write(dec.decode(new Uint8Array(ev.data), { stream: true }));
    };
    term.onData((data) => {
      if (termSocket.readyState === WebSocket.OPEN) termSocket.send(enc.encode(data));
    });
    function sendResize() {
      if (termSocket.readyState !== WebSocket.OPEN) return;
      termSocket.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    }

    // ---- Web pane (live screencast of the REAL site) ----
    const img = document.getElementById('screencast');
    const pane = document.getElementById('web-pane');
    const status = document.getElementById('web-status');
    const surface = document.getElementById('web-surface');
    let lastUrl = null;
    // The pane is "never empty": the child tells us hidden/live based on what the TUI shows. There is
    // no snapshot mode — the pane is ALWAYS the live real site, or hidden (workspace-8a5y).
    let currentMode = 'live';
    // workspace-jria: the user explicitly hid the pane (Hide button / F9). While set, server-driven
    // mode updates must NOT auto-reveal the pane — only an explicit un-hide, or the content going away
    // (mode:hidden) and a fresh navigation, brings it back.
    let userHidden = false;
    const paneSocket = new WebSocket(`${wsBase}/ws/webpane?session=${sessionId}`);
    paneSocket.binaryType = 'arraybuffer';
    paneSocket.onopen = () => { status.textContent = 'live'; };
    paneSocket.onclose = () => { status.textContent = 'closed'; };
    paneSocket.onmessage = (ev) => {
      if (typeof ev.data === 'string') { handleControl(ev.data); return; }
      const blob = new Blob([ev.data], { type: 'image/jpeg' });
      const next = URL.createObjectURL(blob);
      img.onload = () => { if (lastUrl) URL.revokeObjectURL(lastUrl); lastUrl = next; };
      img.src = next;
    };

    function handleControl(text) {
      let msg; try { msg = JSON.parse(text); } catch { return; }
      if (msg.kind === 'toggle') { togglePane(); return; }
      // workspace-jria: while the user has hidden the pane, ignore server "reveal" (live) updates so
      // streaming can't pop the panel back open; still honor "hidden" (it clears the user-hidden state
      // so the next real navigation can reveal again).
      if (msg.kind === 'mode') {
        if (!userHidden || msg.mode === 'hidden') applyMode(msg.mode);
      }
    }

    function applyMode(mode) {
      currentMode = mode;
      if (mode === 'hidden') {
        userHidden = false; // content went away — a fresh navigation may reveal the pane again.
        setPaneVisible(false);
        return;
      }
      // live — the real site stream.
      setPaneVisible(true);
      img.style.display = 'block';
      status.textContent = 'live';
    }

    function setPaneVisible(visible) {
      const wasHidden = pane.classList.contains('hidden');
      pane.classList.toggle('hidden', !visible);
      // workspace-opb2: the launcher show->hide on initial connect changes the PTY width; force a full
      // repaint after it settles so the bottom launcher rows don't keep stale (pre-resize) cells.
      if (wasHidden === visible) { fit.fit(); sendResize(); scheduleRepaint(); }
    }
    // Forward clicks: translate the click position on the <img> to page CSS pixels.
    img.addEventListener('click', (e) => {
      if (paneSocket.readyState !== WebSocket.OPEN) return;
      const rect = img.getBoundingClientRect();
      const scaleX = (img.naturalWidth || rect.width) / rect.width;
      const scaleY = (img.naturalHeight || rect.height) / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      paneSocket.send(JSON.stringify({ type: 'click', x, y }));
    });
    // Deterministic test seams (used by the automated verifier; harmless in production).
    window.__wcPaneClick = (x, y) => paneSocket.send(JSON.stringify({ type: 'click', x, y }));
    window.__wcNavigate = (url) => paneSocket.send(JSON.stringify({ type: 'navigate', url }));
    window.__wcPaneReady = () => paneSocket.readyState === WebSocket.OPEN && !!img.src;
    window.__wcPaneMode = () => currentMode;
    window.__wcPaneVisible = () => !pane.classList.contains('hidden');

    document.getElementById('web-go').addEventListener('click', () => {
      let url = document.getElementById('web-url').value.trim();
      if (!url) return;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      paneSocket.send(JSON.stringify({ type: 'navigate', url }));
    });
    document.getElementById('web-hide').addEventListener('click', togglePane);
    // workspace-jria: Hide collapses the WHOLE panel and stays collapsed during live streaming.
    // togglePane records the user's intent (userHidden) so server mode:live updates can't re-reveal it,
    // reflows the terminal to full width (and hides the splitter), and tells the child to pause the
    // screencast while hidden so it costs nothing.
    function togglePane() {
      const willHide = !pane.classList.contains('hidden');
      userHidden = willHide;
      pane.classList.toggle('hidden', willHide);
      const termPane = document.getElementById('term-pane');
      termPane.style.flex = willHide ? '1 1 100%' : '1 1 55%';
      splitter.style.display = willHide ? 'none' : '';
      fit.fit();
      sendResize();
      scheduleRepaint(); // workspace-opb2: full repaint after the width change so no stale cells survive
      if (paneSocket.readyState === WebSocket.OPEN) {
        paneSocket.send(JSON.stringify({ type: 'paneVisible', visible: !willHide }));
      }
    }
    window.addEventListener('keydown', (e) => { if (e.key === 'F9') { e.preventDefault(); togglePane(); } });

    // ---- Splitter + resize ----
    // workspace-opb2: after a PTY resize the xterm BUFFER is correct on every row but the on-screen
    // pixels can be stale (a partial repaint left old cells — broken launcher separators, a duplicated
    // reader title, a garbled status bar). force a full re-render of every row from the (correct)
    // buffer once the resize settles, and debounce rapid resizes (splitter drag, the show->hide that
    // fires during the initial pane-bridge connect) so they coalesce into one clean repaint.
    let resizeTimer = null;
    function repaintTerminal() { try { term.refresh(0, term.rows - 1); } catch (e) { /* renderer not ready */ } }
    function scheduleRepaint() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { fit.fit(); sendResize(); repaintTerminal(); }, 100);
    }
    let dragging = false;
    const splitter = document.getElementById('splitter');
    splitter.addEventListener('mousedown', () => { dragging = true; document.body.style.userSelect = 'none'; });
    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false; document.body.style.userSelect = '';
      scheduleRepaint(); // final clean repaint after the drag ends
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const total = document.getElementById('app').clientWidth;
      const left = Math.min(Math.max(e.clientX, 200), total - 200);
      document.getElementById('term-pane').style.flex = `0 0 ${left}px`;
      fit.fit(); sendResize();
    });
    window.addEventListener('resize', scheduleRepaint);
  </script>
</body>
</html>
