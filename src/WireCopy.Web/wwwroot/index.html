<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WireCopy</title>
  <link rel="stylesheet" href="/vendor/xterm.css" />
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #0b0b0e; color: #ddd;
      font-family: ui-monospace, "DejaVu Sans Mono", monospace; }
    #app { display: flex; height: 100vh; width: 100vw; }
    #term-pane { flex: 1 1 55%; min-width: 240px; height: 100%; background: #000; padding: 4px; box-sizing: border-box; }
    #term { height: 100%; width: 100%; }
    #splitter { width: 5px; cursor: col-resize; background: #222; }
    #web-pane { flex: 1 1 45%; min-width: 0; height: 100%; position: relative; background: #15151a;
      display: flex; flex-direction: column; }
    #web-toolbar { display: flex; gap: 6px; padding: 6px; background: #1c1c22; font-size: 12px; align-items: center; }
    #web-url { flex: 1; background: #0b0b0e; color: #ddd; border: 1px solid #333; padding: 4px 6px; border-radius: 4px; }
    #web-surface { flex: 1; position: relative; overflow: hidden; display: flex; align-items: flex-start; justify-content: center; }
    #screencast { max-width: 100%; display: block; }
    #web-iframe { width: 100%; height: 100%; border: 0; background: #fff; display: none; }
    .hidden { display: none !important; }
    button { background: #2a2a33; color: #ddd; border: 1px solid #3a3a44; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="app">
    <div id="term-pane"><div id="term"></div></div>
    <div id="splitter"></div>
    <div id="web-pane">
      <div id="web-toolbar">
        <input id="web-url" placeholder="https://…" value="" />
        <button id="web-go">Go</button>
        <button id="web-hide" title="Hide web pane (F9)">Hide</button>
        <span id="web-status">connecting…</span>
      </div>
      <div id="web-surface">
        <img id="screencast" alt="web pane" />
        <iframe id="web-iframe" sandbox="allow-same-origin"></iframe>
      </div>
    </div>
  </div>

  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/addon-fit.js"></script>
  <script>
    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const wsBase = `${wsProto}://${location.host}`;
    // One session id per tab correlates the terminal child with its web pane.
    const sessionId = (crypto.randomUUID ? crypto.randomUUID() : String(Math.random())).replace(/-/g, '');

    // ---- Terminal ----
    const term = new Terminal({
      fontFamily: 'ui-monospace, "DejaVu Sans Mono", monospace',
      fontSize: 14,
      cursorBlink: true,
      theme: { background: '#000000' },
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('term'));
    fit.fit();

    const termSocket = new WebSocket(`${wsBase}/ws/terminal?session=${sessionId}`);
    termSocket.binaryType = 'arraybuffer';
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    termSocket.onopen = () => sendResize();
    termSocket.onmessage = (ev) => {
      if (typeof ev.data === 'string') term.write(ev.data);
      else term.write(dec.decode(new Uint8Array(ev.data)));
    };
    term.onData((data) => {
      if (termSocket.readyState === WebSocket.OPEN) termSocket.send(enc.encode(data));
    });
    function sendResize() {
      if (termSocket.readyState !== WebSocket.OPEN) return;
      termSocket.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    }

    // ---- Web pane (screencast + snapshot) ----
    const img = document.getElementById('screencast');
    const iframe = document.getElementById('web-iframe');
    const pane = document.getElementById('web-pane');
    const status = document.getElementById('web-status');
    const surface = document.getElementById('web-surface');
    let lastUrl = null;
    // The pane is "never empty": the child tells us hidden/live/snapshot based on what the TUI shows.
    let currentMode = 'live';
    const paneSocket = new WebSocket(`${wsBase}/ws/webpane?session=${sessionId}`);
    paneSocket.binaryType = 'arraybuffer';
    paneSocket.onopen = () => { status.textContent = 'live'; };
    paneSocket.onclose = () => { status.textContent = 'closed'; };
    paneSocket.onmessage = (ev) => {
      if (typeof ev.data === 'string') { handleControl(ev.data); return; }
      const blob = new Blob([ev.data], { type: 'image/jpeg' });
      const next = URL.createObjectURL(blob);
      img.onload = () => { if (lastUrl) URL.revokeObjectURL(lastUrl); lastUrl = next; };
      img.src = next;
    };

    function handleControl(text) {
      let msg; try { msg = JSON.parse(text); } catch { return; }
      if (msg.kind === 'toggle') { togglePane(); return; }
      if (msg.kind === 'mode') applyMode(msg.mode, msg.html);
    }

    function applyMode(mode, html) {
      currentMode = mode;
      if (mode === 'hidden') { setPaneVisible(false); return; }
      setPaneVisible(true);
      if (mode === 'snapshot') {
        iframe.srcdoc = html || '';
        iframe.style.display = 'block';
        img.style.display = 'none';
        status.textContent = 'reader';
      } else { // live
        iframe.style.display = 'none';
        img.style.display = 'block';
        status.textContent = 'live';
      }
    }

    function setPaneVisible(visible) {
      const wasHidden = pane.classList.contains('hidden');
      pane.classList.toggle('hidden', !visible);
      if (wasHidden === visible) { fit.fit(); sendResize(); }
    }
    // Forward clicks: translate the click position on the <img> to page CSS pixels.
    img.addEventListener('click', (e) => {
      if (paneSocket.readyState !== WebSocket.OPEN) return;
      const rect = img.getBoundingClientRect();
      const scaleX = (img.naturalWidth || rect.width) / rect.width;
      const scaleY = (img.naturalHeight || rect.height) / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      paneSocket.send(JSON.stringify({ type: 'click', x, y }));
    });
    // Deterministic test seams (used by the automated verifier; harmless in production).
    window.__wcPaneClick = (x, y) => paneSocket.send(JSON.stringify({ type: 'click', x, y }));
    window.__wcNavigate = (url) => paneSocket.send(JSON.stringify({ type: 'navigate', url }));
    window.__wcPaneReady = () => paneSocket.readyState === WebSocket.OPEN && !!img.src;
    window.__wcPaneMode = () => currentMode;
    window.__wcPaneVisible = () => !pane.classList.contains('hidden');
    window.__wcSnapshotText = () => { try { return iframe.contentDocument?.body?.innerText || ''; } catch { return ''; } };

    document.getElementById('web-go').addEventListener('click', () => {
      let url = document.getElementById('web-url').value.trim();
      if (!url) return;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      paneSocket.send(JSON.stringify({ type: 'navigate', url }));
    });
    document.getElementById('web-hide').addEventListener('click', togglePane);
    function togglePane() { document.getElementById('web-pane').classList.toggle('hidden'); fit.fit(); sendResize(); }
    window.addEventListener('keydown', (e) => { if (e.key === 'F9') { e.preventDefault(); togglePane(); } });

    // ---- Splitter + resize ----
    let dragging = false;
    const splitter = document.getElementById('splitter');
    splitter.addEventListener('mousedown', () => { dragging = true; document.body.style.userSelect = 'none'; });
    window.addEventListener('mouseup', () => { dragging = false; document.body.style.userSelect = ''; });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const total = document.getElementById('app').clientWidth;
      const left = Math.min(Math.max(e.clientX, 200), total - 200);
      document.getElementById('term-pane').style.flex = `0 0 ${left}px`;
      fit.fit(); sendResize();
    });
    window.addEventListener('resize', () => { fit.fit(); sendResize(); });
  </script>
</body>
</html>
