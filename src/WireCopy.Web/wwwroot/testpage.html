<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WireCopy screencast test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 40px; background: #fff; color: #111; }
    h1 { color: #1558d6; }
    #box { margin-top: 24px; padding: 24px; border: 2px solid #1558d6; border-radius: 8px; font-size: 20px; }
    #state { font-weight: 700; }
    /* Pinned at a known page position so the coordinate-based screencast click test is deterministic. */
    button { position: absolute; left: 50px; top: 300px; width: 220px; height: 60px;
      font-size: 18px; cursor: pointer; background: #1558d6; color: #fff; border: 0; border-radius: 6px; }
    .on { background: #0a7f2e !important; }
  </style>
</head>
<body>
  <h1>WireCopy web pane — live screencast</h1>
  <p>This page is rendered by a real Chromium and streamed into the tab via CDP.</p>
  <div id="box">Click state: <span id="state">OFF</span></div>
  <button id="btn">Toggle me</button>
  <script>
    let on = false;
    const btn = document.getElementById('btn');
    const state = document.getElementById('state');
    const box = document.getElementById('box');
    btn.addEventListener('click', () => {
      on = !on;
      state.textContent = on ? 'ON' : 'OFF';
      box.classList.toggle('on', on);
      btn.classList.toggle('on', on);
    });
  </script>
</body>
</html>
