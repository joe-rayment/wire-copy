<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Modal states</title>
<style>
  html, body { background: #0a0a0a; margin: 0; }
  body {
    padding: 20px 24px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 15px;
    line-height: 1.55;
    color: #00d700;
  }
  .lbl {
    color: #87ff87;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 6px;
    font-weight: 700;
  }
  .block { margin-bottom: 20px; }

  /* Modals rendered with CSS borders for guaranteed alignment.
     In-terminal, these draw with ╭─╮ │ ╰─╯ — here we preserve the look
     with border + border-radius. */
  .modal {
    display: inline-block;
    border: 1.5px solid #5fff5f;
    border-radius: 10px;
    padding: 18px 22px;
    min-width: 340px;
    color: #00d700;
  }
  .modal .row { margin: 0 0 4px; }
  .modal .row:last-child { margin-bottom: 0; }

  .g   { color: #00d700; font-weight: 700; }
  .m   { color: #5fff87; }
  .r   { color: #ff5f5f; font-weight: 700; }
  .c   { color: #00ffff; font-weight: 700; }
  .am  { color: #ffd75f; font-weight: 700; }
  .b   { color: #ff87d7; font-weight: 700; }
  .spin { color: #00d700; font-weight: 700; display: inline-block; animation: spin 1s steps(4) infinite; }
  @keyframes spin {
    0%   { content: "|"; }
    25%  { content: "/"; }
    50%  { content: "-"; }
    75%  { content: "\\"; }
  }
  .spin::before { content: "|"; animation: spinChar 1s steps(4) infinite; }
  @keyframes spinChar {
    0%   { content: "|"; }
    25%  { content: "/"; }
    50%  { content: "-"; }
    75%  { content: "\\"; }
  }
</style>
</head>
<body>

  <div class="block">
    <div class="lbl">Loading</div>
    <div class="modal">
      <div class="row"><span class="g">Loading page...</span></div>
      <div class="row"><span class="m">arstechnica.com/science/2026</span></div>
    </div>
  </div>

  <div class="block">
    <div class="lbl">Error</div>
    <div class="modal" style="border-color:#ff5f5f">
      <div class="row"><span class="r">Page failed to load</span></div>
      <div class="row"><span class="m">Connection timed out after 30s</span></div>
      <div class="row" style="margin-top:10px">
        <span class="c">R</span><span class="m">:retry &nbsp;</span>
        <span class="c">b</span><span class="m">:back &nbsp;</span>
        <span class="c">o</span><span class="m">:browser</span>
      </div>
    </div>
  </div>

  <div class="block">
    <div class="lbl">Confirm — delete bookmark</div>
    <div class="modal" style="border-color:#ff87d7">
      <div class="row"><span class="b">Delete this bookmark?</span></div>
      <div class="row"><span class="m">NEW YORK TIMES &nbsp;·&nbsp; nytimes.com</span></div>
      <div class="row" style="margin-top:10px">
        <span class="c">y</span><span class="m">:yes &nbsp; &nbsp;</span>
        <span class="c">n</span><span class="m">:no / Esc</span>
      </div>
    </div>
  </div>

</body>
</html>
